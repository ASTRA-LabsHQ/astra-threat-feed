name: Sync Threat Feed

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:         # Allow manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        run: go build -ldflags "-s -w" -o astra-feed ./cmd/astra-feed

      - name: Create config
        run: cp config.example.yaml config.yaml

      - name: Sync feeds
        run: ./astra-feed sync

      - name: Verify output is non-empty
        run: |
          count=$(find output -name '*.json' ! -name 'manifest.json' | wc -l)
          echo "Event files: $count"
          if [ "$count" -eq 0 ]; then
            echo "No IOC data was fetched — aborting deploy to protect existing feed."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          commit_message: 'chore: sync threat feed'
          force_orphan: true
